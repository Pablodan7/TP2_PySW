<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turismo - Contacto</title>
  <!-- Enlace al CSS -->
  <link rel="stylesheet" href="css/contacto.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="destinos.html">Destinos</a></li>
        <li><a href="agencias.html">Agencias</a></li>
        <li><a href="precios.html">Precios</a></li>
        <li><a href="blog.html">Blog</a></li>
      </ul>
    </nav>
  </header>

  <!-- FORMULARIO DE CONTACTO -->
  <main>
    <section class="contacto">
      <h2>Formulario de Contacto</h2>
      <form id="contact-form">
        <div class="form-grid">
          <label for="nombre">Nombre:</label>
          <input type="text" id="nombre" name="nombre" required>

          <label for="email">Correo:</label>
          <input type="email" id="email" name="email" required>

          <label for="mensaje">Mensaje:</label>
          <textarea id="mensaje" name="mensaje" rows="5" required></textarea>
        </div>

        <!-- Botón con spinner -->
        <button type="submit" class="btn-enviar">
          Enviar
          <span class="spinner"></span>
        </button>
      </form>
    </section>
  </main>

  <!-- MODAL DE CONFIRMACIÓN -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <h3>¡Formulario enviado!</h3>
      <p>Gracias por contactarnos. Te responderemos pronto.</p>
      <button id="cerrar-modal">Cerrar</button>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 Turismo UNJu</p>
  </footer>

  <!-- Script mínimo para mostrar modal -->
  <script>
    const form = document.getElementById('contact-form');
    const modal = document.getElementById('modal');
    const cerrarModal = document.getElementById('cerrar-modal');
    const spinner = document.querySelector('.spinner');

    form.addEventListener('submit', e => {
      e.preventDefault();
      spinner.style.display = 'inline-block'; // mostrar spinner
      setTimeout(() => {
        spinner.style.display = 'none'; // ocultar spinner
        modal.style.display = 'flex'; // mostrar modal centrado
      }, 2000); // simula carga de 2 segundos
    });

    cerrarModal.addEventListener('click', () => {
      modal.style.display = 'none';
    });
  </script>

</body>
</html>
